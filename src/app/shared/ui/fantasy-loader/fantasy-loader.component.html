<div class="fantasy-loader" [ngClass]="'size-' + size">
  <div class="loader-container">
    <!-- Main Mystical Orb -->
    <div class="mystical-orb">
      <div class="orb-core"></div>
      <div class="orb-ring ring-1"></div>
      <div class="orb-ring ring-2"></div>
      <div class="orb-ring ring-3"></div>

      <!-- Floating Particles -->
      <div class="particle particle-1"></div>
      <div class="particle particle-2"></div>
      <div class="particle particle-3"></div>
      <div class="particle particle-4"></div>
      <div class="particle particle-5"></div>
      <div class="particle particle-6"></div>
    </div>

    <!-- Mystical Runes -->
    <div class="runes-container">
      <div class="rune rune-1">⚡</div>
      <div class="rune rune-2">✦</div>
      <div class="rune rune-3">◊</div>
      <div class="rune rune-4">◉</div>
      <div class="rune rune-5">⟐</div>
      <div class="rune rune-6">✧</div>
    </div>

    <!-- Mystical Constellation -->
    <div class="constellation">
      <div class="star star-1">✨</div>
      <div class="star star-2">⭐</div>
      <div class="star star-3">✯</div>
      <div class="star star-4">✶</div>
    </div>

    <!-- Energy Waves -->
    <div class="energy-waves">
      <div class="wave wave-1"></div>
      <div class="wave wave-2"></div>
      <div class="wave wave-3"></div>
    </div>
  </div>

  <!-- Loading Text with Typewriter Effect -->
  @if (showText) {
  <div class="loading-text">
    <span class="text-content">{{ text }}</span>
    <span class="cursor">|</span>
  </div>
  }
</div>
