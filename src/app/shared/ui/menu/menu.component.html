<p-menu
  #menu
  [model]="items"
  [popup]="true"
  styleClass="user-menu"
  appMenuPositioning="user-menu"
></p-menu>
<div class="menu" (click)="menu.toggle($event)">
  <ng-container *ngIf="displayName(); else menuName">
    <div class="label">{{ displayName() }}</div>
  </ng-container>
  <ng-template #menuName>
    <div class="label">{{ 'Menu' | translate }}</div>
  </ng-template>
  <app-chevron-down-icon />
</div>
