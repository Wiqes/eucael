<p-button
  variant="outlined"
  severity="contrast"
  icon="pi pi-google"
  label="Sign in with Google"
  (click)="click.emit()"
  class="google-signin-btn"
  [iconPos]="'left'"
>
  <ng-template pTemplate="icon">
    <span class="google-icon-wrapper">
      <app-google-icon></app-google-icon>
    </span>
  </ng-template>
</p-button>
