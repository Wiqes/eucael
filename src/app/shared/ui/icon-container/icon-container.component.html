<div class="icon-container" [ngStyle]="containerStyle()">
  <div class="glow-ring"></div>
  <div class="particles">
    <div class="particle" *ngFor="let i of [1, 2, 3, 4, 5, 6, 7, 8]"></div>
  </div>
  <div class="icon-wrapper">
    <ng-container *ngComponentOutlet="iconComponent()"></ng-container>
  </div>
  <div class="shimmer"></div>
</div>
