<p-dialog
  [header]="'Upload Avatar' | translate"
  [modal]="true"
  [visible]="visible()"
  [closable]="true"
  [closeOnEscape]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '600px', maxWidth: '95vw' }"
  [appendTo]="'body'"
  (onHide)="onDialogClose()"
  (visibleChange)="onVisibleChange($event)"
>
  <div class="avatar-upload-content">
    <!-- Image Preview and Crop Section -->
    @if (selectedFile() && !isUploading()) {
    <div class="crop-section">
      <div class="crop-container">
        <div class="image-preview">
          <canvas
            #cropCanvas
            [width]="cropCanvasSize"
            [height]="cropCanvasSize"
            [style.cursor]="currentCursor()"
            (mousedown)="onMouseDown($event)"
            (mousemove)="onMouseMove($event)"
            (mouseup)="onMouseUp()"
            (mouseleave)="onMouseLeave()"
            (wheel)="onWheel($event)"
            (touchstart)="onTouchStart($event)"
            (touchmove)="onTouchMove($event)"
            (touchend)="onTouchEnd($event)"
          ></canvas>
        </div>
        <app-crop-controls
          [zoom]="zoom"
          [previewImage]="previewImage()"
          (zoomIn)="adjustZoom(0.2)"
          (zoomOut)="adjustZoom(-0.2)"
          (resetCrop)="resetCrop()"
        />
      </div>

      <app-crop-instructions />
    </div>
    }

    <!-- Upload Progress -->
    @if (isUploading()) {
    <div class="upload-progress">
      <p-progressBar [value]="uploadProgress()" [showValue]="true"></p-progressBar>
      <p>{{ 'Uploading your avatar...' | translate }}</p>
    </div>
    }

    <!-- Error Message -->
    @if (errorMessage()) {
    <div class="error-message">
      <i class="pi pi-exclamation-triangle"></i>
      <span>{{ errorMessage() }}</span>
    </div>
    }
  </div>

  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <p-button
        [label]="'Cancel' | translate"
        icon="pi pi-times"
        severity="secondary"
        (onClick)="onCancel()"
        [disabled]="isUploading()"
      />
      @if (selectedFile() && !isUploading()) {
      <p-button
        [label]="'Upload' | translate"
        icon="pi pi-upload"
        (onClick)="onUpload()"
        [disabled]="!selectedFile()"
        severity="success"
      />
      }
    </div>
  </ng-template>
</p-dialog>
