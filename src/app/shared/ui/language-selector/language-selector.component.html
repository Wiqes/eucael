<p-menu #langMenu [model]="languageItems" [popup]="true" styleClass="language-menu"></p-menu>
<div class="menu" (click)="langMenu.toggle($event)">
  <span *ngIf="selectedLanguageObj?.code === 'uk'" class="lang-icon">
    {{ selectedLanguageObj?.flag }}
  </span>
  <span class="lang-label">{{ selectedLanguageObj?.code?.toUpperCase() }}</span>
  <app-chevron-down-icon />
</div>
