<div class="image-compare-container">
  <div class="image-container">
    <img [src]="imageUrl()" alt="Image" />
  </div>

  <!-- View Icon Button -->
  <button
    type="button"
    class="view-button-simple"
    (click)="onViewFullImage()"
    title="View full image"
  >
    <i class="pi pi-eye" style="color: #34d399; font-size: 1.25rem"></i>
  </button>
</div>
