<div class="mystical-orb" [style.--animation-speed]="animationSpeed">
  <!-- Power Core with Multiple Layers -->
  <div class="orb-core">
    <div class="core-inner"></div>
    <div class="core-pulse"></div>
  </div>

  <!-- Enhanced Rotating Rings -->
  @for (ring of rings; track ring) {
  <div
    class="orb-ring ring-{{ ring }}"
    [style.--ring-speed]="
      animationSpeed *
        (ring === 1 ? 1 : ring === 2 ? 1.3 : ring === 3 ? 0.8 : ring === 4 ? 2 : 0.5) +
      's'
    "
    [style.animation-direction]="ring % 2 === 0 ? 'reverse' : 'normal'"
  ></div>
  }

  <!-- Dynamic Floating Particles -->
  @for (particle of particles; track particle) {
  <app-orb-particle class="particle particle-{{ particle }}" [particle]="particle" />
  }
</div>
