<div
  class="fantasy-loader"
  [ngClass]="['size-' + size, themeClass, intensityClass, 'stage-' + currentStage()]"
  [style.--animation-speed]="currentSpeed()"
>
  <!-- Epic Background Effects -->
  @if (intensity === 'medium') {
  <app-cosmic-dust />
  }

  <div class="loader-container">
    <!-- Main Mystical Orb -->
    <app-mystical-orb
      [intensity]="intensity"
      [animationSpeed]="currentSpeed()"
      [particleCount]="totalParticles()"
    ></app-mystical-orb>

    <!-- Enhanced Mystical Runes -->
    <app-runes-container
      [intensity]="intensity"
      [currentStage]="currentStage()"
    ></app-runes-container>

    <!-- Enhanced Constellation -->
    <app-constellation [intensity]="intensity"></app-constellation>

    <!-- Multi-Layer Energy Waves -->
    <app-energy-waves [intensity]="intensity" [animationSpeed]="currentSpeed()"></app-energy-waves>
  </div>

  <!-- Enhanced Loading Text with Dynamic Animation -->
  @if (showText) {
  <div class="loading-text">
    <div class="text-container">
      <span class="text-content">{{ displayedText() }}</span>
      <span class="cursor">|</span>
    </div>
  </div>
  }

  <!-- Loading Progress Indicator -->
  @if (intensity === 'epic' || intensity === 'medium') {
  <div class="progress-indicator">
    <div class="progress-orbs">
      @for (orb of [0,1,2,3,4]; track orb) {
      <div
        class="progress-orb"
        [class.active]="orb <= currentStage()"
        [style.--orb-delay]="orb * 0.5 + 's'"
      ></div>
      }
    </div>
  </div>
  }
</div>
