<div class="users-table-container">
  <h2>Users</h2>
  <p-table [value]="users">
    <ng-template pTemplate="header">
      <tr>
        <th>#</th>
        <th>Username</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-user let-i="rowIndex">
      <tr>
        <td>{{ i + 1 }}</td>
        <td>{{ user.username }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
