<div class="flex flex-col md:flex-row min-h-[60vh]">
  <div class="w-full md:w-5/12 flex flex-col items-center justify-center gap-4 py-8 px-4">
    <form
      (ngSubmit)="login()"
      #loginForm="ngForm"
      class="flex flex-col gap-4 w-full max-w-[17.35rem]"
    >
      <div class="flex flex-col gap-2">
        <label for="username">Username</label>
        <input
          pInputText
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          required
          autocomplete="username"
        />
      </div>
      <div class="flex flex-col gap-2">
        <label for="password">Password</label>
        <input
          pInputText
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
        />
      </div>
      <div class="flex">
        <p-button
          label="Login"
          icon="pi pi-user"
          type="submit"
          severity="info"
          class="w-full max-w-[17.35rem]"
          styleClass="w-full mx-auto"
          [disabled]="loginForm.invalid || loadingLogin"
          [loading]="loadingLogin"
        />
      </div>
    </form>
    <app-google-button (click)="googleLogin()" />
  </div>
  <div class="w-full md:w-2/12 flex flex-col items-center justify-center">
    <p-divider layout="vertical" class="!hidden md:!flex"><b>OR</b></p-divider>
    <p-divider layout="horizontal" class="!flex md:!hidden"><b>OR</b></p-divider>
  </div>
  <div class="w-full md:w-5/12 flex items-center justify-center py-8 px-4">
    <p-button
      label="Sign Up"
      icon="pi pi-user-plus"
      severity="info"
      class="w-full max-w-[17.35rem]"
      styleClass="w-full mx-auto"
      (click)="showRegister = true"
    />
  </div>
  <p-dialog
    header="Register"
    [(visible)]="showRegister"
    [modal]="true"
    [closable]="true"
    [dismissableMask]="true"
    [style]="{ width: '350px' }"
  >
    <form
      (ngSubmit)="register()"
      #registerForm="ngForm"
      autocomplete="off"
      class="p-fluid flex flex-col gap-4"
    >
      <div class="flex flex-col gap-2">
        <label for="reg-username">Email</label>
        <input
          pInputText
          id="reg-username"
          type="email"
          [(ngModel)]="regUsername"
          name="regUsername"
          required
          autocomplete="username"
          [readonly]="otpRequested"
        />
      </div>
      <div class="flex flex-col gap-2">
        <label for="reg-password">Password</label>
        <input
          pInputText
          id="reg-password"
          type="password"
          [(ngModel)]="regPassword"
          name="regPassword"
          required
          autocomplete="new-password"
          [readonly]="otpRequested"
        />
      </div>
      <div *ngIf="otpRequested" class="flex flex-col gap-2">
        <label for="reg-otp">OTP</label>
        <input
          pInputText
          id="reg-otp"
          type="text"
          [(ngModel)]="regOtp"
          name="regOtp"
          required
          autocomplete="one-time-code"
        />
      </div>
      <p-button
        [label]="otpRequested ? 'Register' : 'Request OTP'"
        icon="pi pi-user-plus"
        type="submit"
        severity="info"
        class="w-full"
        styleClass="w-full"
        [loading]="loadingLogin"
        [disabled]="
          (!otpRequested &&
            ((registerForm.controls['regUsername'] &&
              registerForm.controls['regUsername'].invalid) ||
              (registerForm.controls['regPassword'] &&
                registerForm.controls['regPassword'].invalid))) ||
          (otpRequested &&
            registerForm.controls['regOtp'] &&
            registerForm.controls['regOtp'].invalid)
        "
      />
    </form>
  </p-dialog>
</div>
