<div class="flex flex-col md:flex-row min-h-[60vh]">
  <p-toast></p-toast>
  <div class="w-full md:w-5/12 flex flex-col items-center justify-center gap-4 py-8 px-4">
    <form
      (ngSubmit)="login()"
      #loginForm="ngForm"
      class="flex flex-col gap-4 w-full max-w-[17.35rem]"
    >
      <div class="flex flex-col gap-2">
        <label for="username">Username</label>
        <input
          pInputText
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          required
          autocomplete="username"
        />
      </div>
      <div class="flex flex-col gap-2">
        <label for="password">Password</label>
        <input
          pInputText
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
        />
      </div>
      <div class="flex">
        <p-button
          label="Login"
          icon="pi pi-user"
          type="submit"
          severity="info"
          class="w-full max-w-[17.35rem]"
          styleClass="w-full mx-auto"
          [disabled]="loginForm.invalid || loadingLogin"
          [loading]="loadingLogin"
        />
      </div>
    </form>
    <div class="google-button-container">
      <p-button
        variant="outlined"
        severity="contrast"
        icon="pi pi-google"
        label="Sign in with Google"
        (click)="googleLogin()"
        styleClass="w-full max-w-[17.35rem] google-signin-btn"
        [iconPos]="'left'"
      >
        <ng-template pTemplate="icon">
          <span class="google-icon-wrapper">
            <svg width="20" height="20" viewBox="0 0 48 48">
              <g>
                <path
                  fill="#4285F4"
                  d="M24 9.5c3.54 0 6.7 1.22 9.19 3.23l6.85-6.85C35.64 2.36 30.18 0 24 0 14.82 0 6.73 5.82 2.69 14.09l7.99 6.2C12.13 13.13 17.57 9.5 24 9.5z"
                />
                <path
                  fill="#34A853"
                  d="M46.1 24.5c0-1.64-.15-3.22-.42-4.74H24v9.04h12.39c-.54 2.9-2.18 5.36-4.66 7.04l7.19 5.6C43.98 37.36 46.1 31.36 46.1 24.5z"
                />
                <path
                  fill="#FBBC05"
                  d="M10.68 28.29A14.5 14.5 0 019.5 24c0-1.49.25-2.93.68-4.29l-7.99-6.2A23.94 23.94 0 000 24c0 3.77.9 7.34 2.69 10.49l7.99-6.2z"
                />
                <path
                  fill="#EA4335"
                  d="M24 48c6.18 0 11.36-2.05 15.15-5.59l-7.19-5.6c-2.01 1.35-4.59 2.16-7.96 2.16-6.43 0-11.87-3.63-14.32-8.79l-7.99 6.2C6.73 42.18 14.82 48 24 48z"
                />
                <path fill="none" d="M0 0h48v48H0z" />
              </g>
            </svg>
          </span>
        </ng-template>
      </p-button>
    </div>
  </div>
  <div class="w-full md:w-2/12 flex flex-col items-center justify-center">
    <p-divider layout="vertical" class="!hidden md:!flex"><b>OR</b></p-divider>
    <p-divider layout="horizontal" class="!flex md:!hidden"><b>OR</b></p-divider>
  </div>
  <div class="w-full md:w-5/12 flex items-center justify-center py-8 px-4">
    <p-button
      label="Sign Up"
      icon="pi pi-user-plus"
      severity="info"
      class="w-full max-w-[17.35rem]"
      styleClass="w-full mx-auto"
      (click)="showRegister = true"
    />
  </div>
  <p-dialog
    header="Register"
    [(visible)]="showRegister"
    [modal]="true"
    [closable]="true"
    [dismissableMask]="true"
    [style]="{ width: '350px' }"
  >
    <form
      (ngSubmit)="register()"
      #registerForm="ngForm"
      autocomplete="off"
      class="p-fluid flex flex-col gap-4"
    >
      <div class="flex flex-col gap-2">
        <label for="reg-username">Email</label>
        <input
          pInputText
          id="reg-username"
          type="email"
          [(ngModel)]="regUsername"
          name="regUsername"
          required
          autocomplete="username"
          [readonly]="otpRequested"
        />
      </div>
      <div class="flex flex-col gap-2">
        <label for="reg-password">Password</label>
        <input
          pInputText
          id="reg-password"
          type="password"
          [(ngModel)]="regPassword"
          name="regPassword"
          required
          autocomplete="new-password"
          [readonly]="otpRequested"
        />
      </div>
      <div *ngIf="otpRequested" class="flex flex-col gap-2">
        <label for="reg-otp">OTP</label>
        <input
          pInputText
          id="reg-otp"
          type="text"
          [(ngModel)]="regOtp"
          name="regOtp"
          required
          autocomplete="one-time-code"
        />
      </div>
      <p-button
        [label]="otpRequested ? 'Register' : 'Request OTP'"
        icon="pi pi-user-plus"
        type="submit"
        severity="info"
        class="w-full"
        styleClass="w-full"
        [loading]="loadingLogin"
        [disabled]="
          (!otpRequested &&
            ((registerForm.controls['regUsername'] &&
              registerForm.controls['regUsername'].invalid) ||
              (registerForm.controls['regPassword'] &&
                registerForm.controls['regPassword'].invalid))) ||
          (otpRequested &&
            registerForm.controls['regOtp'] &&
            registerForm.controls['regOtp'].invalid)
        "
      />
    </form>
  </p-dialog>
</div>
