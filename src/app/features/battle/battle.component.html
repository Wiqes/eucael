<div class="battle-arena">
  <!-- Battle Canvas -->
  <div class="canvas-wrapper">
    <app-battle-canvas />

    <!-- Battle Overlay UI -->
    @if (battleState$ | async; as state) {
    <div class="battle-overlay">
      <!-- Character 1 Status - Left -->
      <app-character-status-card [character]="state.character1" [alignment]="'left'" />

      <!-- VS Badge -->
      <app-battle-vs-badge />

      <!-- Character 2 Status - Right -->
      <app-character-status-card [character]="state.character2" [alignment]="'right'" />
    </div>

    <!-- Victory Banner -->
    @if (state.isComplete && state.winner) {
    <app-victory-banner [winner]="state.winner" />
    } }
  </div>

  <!-- Control Panel -->
  <app-battle-controls
    [isBattleActive]="(battleState$ | async) !== null"
    (startBattle)="startBattle()"
    (resetBattle)="resetBattle()"
  />
</div>
