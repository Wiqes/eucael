<div class="battle-arena">
  <!-- Battle Canvas -->
  <div class="canvas-wrapper">
    <app-battle-canvas />

    <!-- Battle Overlay UI -->
    @if (battleState$ | async; as state) {
      <div class="battle-overlay">
        <!-- Character 1 Status - Left -->
        <app-character-status-card
          [character]="state.team1[state.activeTeam1Index]"
          alignment="left"
        />

        <!-- VS Badge -->
        <app-battle-vs-badge />

        <!-- Character 2 Status - Right -->
        <app-character-status-card
          [character]="state.team2[state.activeTeam2Index]"
          alignment="right"
        />
      </div>

      <!-- Victory Banner -->
      @if (state.isComplete && state.winner) {
        <app-victory-banner [winner]="state.winner" />
      }
    }
  </div>

  <!-- Control Panel -->
  <app-battle-controls
    [isBattleActive]="(isBattleActive$ | async) ?? false"
    (startBattle)="startBattle()"
    (terminateBattle)="resetAndTerminateBattle()"
  />
</div>
