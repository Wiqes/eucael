<div class="victory-overlay">
  <div class="victory-content glass-panel">
    <h1 class="victory-title">{{ winner }}</h1>
    <p class="victory-subtitle">{{ 'VICTORY!' | translate }}</p>
    <div class="victory-particles"></div>
    <p-button
      [label]="'Terminate' | translate"
      icon="pi pi-stop"
      (onClick)="onTerminateBattle()"
      severity="secondary"
      size="large"
      styleClass="battle-btn terminate-btn"
    />
  </div>
</div>
