<div class="control-panel glass-panel">
  <div *ngIf="!isBattleActive" class="start-button-wrapper">
    <p-button
      [label]="'Release the Spiders!' | translate"
      icon="pi pi-play"
      (onClick)="onStartBattle()"
      severity="success"
      size="large"
      styleClass="battle-btn start-btn"
    />
  </div>

  <div *ngIf="isBattleActive && isAwaitingPlayerAction" class="control-buttons">
    <p-button
      [label]="'Attack' | translate"
      icon="pi pi-send"
      (onClick)="onPlayerAction('attack')"
      severity="primary"
      size="large"
      styleClass="battle-btn attack-btn"
    />
    <p-button
      [label]="'Critical' | translate"
      icon="pi pi-bolt"
      (onClick)="onPlayerAction('critical')"
      severity="danger"
      size="large"
      styleClass="battle-btn critical-btn"
    />
    <p-button
      [label]="'Combo' | translate"
      icon="pi pi-clone"
      (onClick)="onPlayerAction('combo')"
      severity="info"
      size="large"
      styleClass="battle-btn combo-btn"
    />
    <p-button
      [label]="'Poison' | translate"
      icon="pi pi-bullseye"
      (onClick)="onPlayerAction('poison')"
      severity="help"
      size="large"
      styleClass="battle-btn poison-btn"
    />
    <p-button
      [label]="'Shield' | translate"
      icon="pi pi-shield"
      (onClick)="onPlayerAction('shield')"
      severity="secondary"
      size="large"
      styleClass="battle-btn shield-btn"
    />
  </div>
</div>
