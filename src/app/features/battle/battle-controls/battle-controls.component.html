<div class="control-panel glass-panel">
  <div class="control-buttons">
    <p-button
      *ngIf="!isBattleActive"
      label="Release the Spiders!"
      icon="pi pi-play"
      (onClick)="onStartBattle()"
      severity="success"
      size="large"
      styleClass="battle-btn start-btn"
    />
    <p-button
      *ngIf="isBattleActive"
      label="Terminate Battle"
      icon="pi pi-times"
      (onClick)="onTerminateBattle()"
      severity="secondary"
      size="large"
      styleClass="battle-btn reset-btn"
    />
  </div>
</div>
