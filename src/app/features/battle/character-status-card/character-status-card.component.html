<div
  class="character-status"
  [class.left]="alignment === 'left'"
  [class.right]="alignment === 'right'"
>
  <div class="character-card glass-panel">
    <div class="character-name">{{ character.name }}</div>
    <div class="health-container">
      <div class="health-bar-wrapper">
        <div class="health-bar" [class]="healthBarClass" [style.width.%]="healthPercentage"></div>
        <span class="health-text">{{ character.health }} / {{ character.maxHealth }}</span>
      </div>
    </div>
    <div class="stats-row">
      <p-chip label="⚔️ {{ character.attack }}" styleClass="stat-chip attack-stat" />
      <p-chip label="🛡️ {{ character.defense }}" styleClass="stat-chip defense-stat" />
    </div>
  </div>
</div>
