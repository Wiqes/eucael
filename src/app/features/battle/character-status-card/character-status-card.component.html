<div
  class="character-status"
  [class.left]="alignment === 'left'"
  [class.right]="alignment === 'right'"
>
  <div class="character-card glass-panel">
    <div class="character-name">{{ character.name }}</div>
    <app-health-bar
      [health]="character.health"
      [maxHealth]="character.maxHealth"
      [healthBarClass]="healthBarClass"
      [alignment]="alignment"
    />
    <app-stats-row [attack]="character.attack" [defense]="character.defense" />
  </div>
</div>
