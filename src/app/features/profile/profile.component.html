<div class="profile-container">
  <app-profile-header />

  <div class="profile-content">
    <div class="info-grid">
      <div class="info-card personal-info">
        <div class="card-header">
          <i class="pi pi-user"></i>
          <h3>{{ 'Personal Information' | translate }}</h3>
        </div>
        <div class="card-content">
          <div class="info-item">
            <label>{{ 'Display Name' | translate }}</label>
            <span>{{ displayName() || 'Not provided' }}</span>
          </div>
          <div class="info-item">
            <label>{{ 'Email Address' | translate }}</label>
            <span>{{ email() || 'Not provided' }}</span>
          </div>
          <div class="info-item">
            <label>{{ 'Country' | translate }}</label>
            <span>{{ country() || 'Not specified' }}</span>
          </div>
        </div>
      </div>

      <div class="info-card account-stats">
        <div class="card-header">
          <i class="pi pi-chart-line"></i>
          <h3>{{ 'Account Statistics' | translate }}</h3>
        </div>
        <div class="card-content">
          <div class="stat-item">
            <div class="stat-value">42</div>
            <div class="stat-label">{{ 'Attacks' | translate }}</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">15</div>
            <div class="stat-label">{{ 'Embodyments' | translate }}</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">89%</div>
            <div class="stat-label">{{ 'Success Rate' | translate }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
