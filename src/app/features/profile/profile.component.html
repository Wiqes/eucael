<div *ngIf="!isDataLoading()" class="profile-container">
  <app-profile-header />
  <div class="profile-content">
    <div class="info-grid">
      <div class="info-card personal-info">
        <div *ngIf="profile()" class="card-header">
          <h3>{{ 'Personal Information' | translate }}</h3>
          <i class="pi pi-pencil edit-button" (click)="openEditMode()"></i>
        </div>

        <!-- View Mode -->
        <div class="card-content">
          <app-info-item label="Name" [value]="displayName()" />
          <app-info-item label="Country" [value]="country()" />
          <app-info-item label="Email" [value]="email()" />
          <app-info-item label="Registration" [value]="formattedRegistrationDate()" />
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Profile Dialog -->
  <p-dialog
    [header]="'Edit Profile' | translate"
    [modal]="true"
    [visible]="isDialogVisible()"
    [closable]="true"
    [closeOnEscape]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{ width: '500px', maxWidth: '95vw' }"
    (onHide)="onDialogHide()"
    (visibleChange)="onVisibleChange($event)"
  >
    <div class="edit-profile-dialog">
      <form [formGroup]="editProfileForm" (ngSubmit)="onSubmit()" #profileForm="ngForm">
        <div class="form-group">
          <app-form-control label="Name" [control]="formControls['name']" />
        </div>

        <div class="form-group">
          <app-form-control label="Country" [control]="formControls['country']" />
        </div>
        <div class="dialog-footer">
          <p-button
            [label]="'Cancel' | translate"
            icon="pi pi-times"
            severity="secondary"
            (onClick)="cancelEdit()"
            [disabled]="isUpdating()"
          />
          <p-button
            [label]="'Save' | translate"
            icon="pi pi-save"
            type="submit"
            (onClick)="onSubmit()"
            [disabled]="isUpdating()"
            [loading]="isUpdating()"
          />
        </div>
      </form>
    </div>
  </p-dialog>
</div>
