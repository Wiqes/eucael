<div class="button-container">
  <p-button
    [label]="'Upload' | translate"
    icon="pi pi-upload"
    (onClick)="fileInput.click()"
    severity="success"
  />
</div>

<input
  #fileInput
  type="file"
  accept="image/jpeg,image/jpg,image/png,image/webp"
  (change)="onFileSelected($event)"
  style="display: none"
/>

<app-avatar-upload-dialog #avatarDialog />
