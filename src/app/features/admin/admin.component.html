<div class="admin-container">
  <!-- Reactive Form -->
  <form [formGroup]="adminForm" class="admin-form">
    <h2>Admin Panel</h2>

    <app-form-control
      type="select"
      label="Select Animal"
      placeholder="Choose an animal"
      [control]="selectedAnimalControl"
      [options]="animals()"
      optionValue="id"
    ></app-form-control>

    <div
      *ngIf="selectedAnimalControl.invalid && selectedAnimalControl.touched"
      class="error-message"
    >
      Animal selection is required
    </div>

    <app-form-control
      type="select"
      label="Select Color"
      placeholder="Choose a color"
      [control]="selectedColorControl"
      [options]="colors()"
      optionValue="id"
    ></app-form-control>

    <div *ngIf="selectedColorControl.invalid && selectedColorControl.touched" class="error-message">
      Color selection is required
    </div>

    <app-form-control
      type="select"
      label="Entity Type"
      placeholder="Choose entity type"
      [control]="entityTypeControl"
      [options]="entityTypeOptions"
      optionValue="value"
    ></app-form-control>

    <div *ngIf="entityTypeControl.invalid && entityTypeControl.touched" class="error-message">
      Entity type selection is required
    </div>
  </form>

  <!-- File Upload Section -->
  <div class="upload-section">
    <h3>File Upload</h3>
    <input type="file" (change)="onFileSelected($event)" accept="image/*" />
    <button (click)="onUpload()" [disabled]="!selectedFile || isUploading || adminForm.invalid">
      {{ isUploading ? 'Uploading...' : 'Upload Image' }}
    </button>

    <div *ngIf="uploadProgress > 0">
      <progress [value]="uploadProgress" max="100"></progress>
      {{ uploadProgress }}%
    </div>

    <div *ngIf="uploadedImageUrl">
      <h3>Upload Complete!</h3>
      <img [src]="uploadedImageUrl" alt="Uploaded Image" width="300" />
      <p>
        Image URL:
        <a [href]="uploadedImageUrl" target="_blank">{{ uploadedImageUrl }}</a>
      </p>
    </div>

    <div *ngIf="error">
      <p style="color: red">Error: {{ error }}</p>
    </div>
  </div>
</div>
