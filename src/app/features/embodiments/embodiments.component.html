@if(isDataLoading()) {
<app-loader />
} @else {
<div class="filters">
  <p-multiselect
    [options]="animals()"
    (onChange)="selectedAnimals.set($event.value)"
    placeholder="Select Animals"
    optionLabel="name"
    class="w-full md:w-80"
  >
    <ng-template let-animal #item>
      <div>{{ animal.name.charAt(0).toUpperCase() + animal.name.slice(1) }}</div>
    </ng-template>
  </p-multiselect>
  <div class="totem-switcher">
    <div class="label">Totem</div>
    <p-toggleswitch [(ngModel)]="isTotemShown">
      <ng-template #handle let-checked="checked">
        <i [ngClass]="['!text-xs', 'pi', isTotemShown ? 'pi-check' : 'pi-times']"></i>
      </ng-template>
    </p-toggleswitch>
  </div>
</div>
<div class="embodiments-container" [ngClass]="{ 'hide-slider': !isTotemShown }">
  <div class="genders" *ngFor="let animal of filteredAnimals()">
    <app-animal [animal]="animal" [isTotemShown]="isTotemShown" />
  </div>
</div>
}
