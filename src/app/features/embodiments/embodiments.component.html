<div class="embodiments-container">
  <div class="animal-card" *ngFor="let animal of animals()">
    <div class="genders">
      <p-imagecompare class="shadow-lg rounded-2xl">
        <ng-template #left>
          <img [src]="animal.male.imageUrl" alt="Male" />
        </ng-template>
        <ng-template #right>
          <img [src]="animal.totem.imageUrl" alt="Totem" />
        </ng-template>
      </p-imagecompare>
      <p-imagecompare class="shadow-lg rounded-2xl">
        <ng-template #left>
          <img [src]="animal.female.imageUrl" alt="Female" />
        </ng-template>
        <ng-template #right>
          <img [src]="animal.totem.imageUrl" alt="Totem" />
        </ng-template>
      </p-imagecompare>
    </div>
  </div>
</div>
