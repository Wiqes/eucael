@for (totem of totem(); track totem.id; let idx = $index) { @if(isTotemShown()) {
<app-icon-container [color]="totem.color.hex" [iconName]="animalName()" />
}
<app-card [creature]="getFemaleByColorId(totem.colorId)" [animalName]="animalName()" />
<app-card [creature]="getMaleByColorId(totem.colorId)" [animalName]="animalName()" />
}
