<textarea
  #messageInput
  [ngModel]="newMessageContent"
  (ngModelChange)="onModelChange($event)"
  (keydown)="onKeyPress($event)"
  [placeholder]="'Type your message...' | translate"
  rows="1"
  maxlength="362"
></textarea>
<p-button
  icon="pi pi-send"
  (onClick)="sendMessage()"
  (onMouseDown)="onSendButtonMouseDown($event)"
  tabindex="-1"
  severity="success"
/>
