<textarea
  #messageInput
  [(ngModel)]="newMessageContent"
  (keydown)="onKeyPress($event)"
  (input)="typingHandler()"
  [placeholder]="'Type your message...' | translate"
  rows="1"
  maxlength="322"
></textarea>
<p-button
  [label]="'Send' | translate"
  (onClick)="sendMessage()"
  (onMouseDown)="onSendButtonMouseDown($event)"
  tabindex="-1"
/>
