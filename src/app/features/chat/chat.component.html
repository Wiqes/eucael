<div class="chat-container">
  <div *ngIf="!interlocutorProfile() || isLoading()" class="loader-container">
    <app-loader />
  </div>
  @if(interlocutorProfile() && !isLoading()) {
  <div class="chat-header">
    <div class="header-avatar">
      <app-chat-avatar [profile]="interlocutorProfile()" />
    </div>
    <div class="header-info">
      <div class="header-name">{{ interlocutorName() }}</div>
      <div class="header-status">
        {{ 'presence Text' }}
      </div>
    </div>
  </div>

  <div class="messages" #messagesContainer (scroll)="onScroll()">
    <div *ngFor="let message of messages; trackBy: trackByMessageId" class="message">
      <div
        [class.sender]="message.sender.id === currentUserId()"
        [class.receiver]="message.sender.id !== currentUserId()"
      >
        <div class="message-content">
          {{ message.content }}
        </div>
        <div class="message-meta">
          <small>
            {{ formatMessageTime(message.timestamp) }}
          </small>
          <div
            *ngIf="message.sender.id === currentUserId() && isMessageRead(message.id)"
            class="read-receipt"
          >
            <i class="pi pi-check" [class.read]="true"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <app-typing-indicator
      [isVisible]="getTypingIndicatorVisible()"
      [username]="getTypingUsername()"
    ></app-typing-indicator>
  </div>

  <div class="message-input">
    <textarea
      #messageInput
      [(ngModel)]="newMessageContent"
      (keydown)="onKeyPress($event)"
      (input)="onTyping()"
      placeholder="Type your message..."
      rows="1"
      maxlength="322"
    ></textarea>
    <p-button
      [label]="'Send'"
      (onClick)="sendMessage()"
      [loading]="!isPristine()"
      [disabled]="!isPristine()"
      icon="pi pi-send"
    />
  </div>
  <button
    *ngIf="showScrollToBottom()"
    class="scroll-to-bottom-btn"
    (click)="scrollToBottomManual()"
    title="Scroll to bottom"
  >
    <i class="pi pi-chevron-down"></i>
  </button>
  }
</div>
