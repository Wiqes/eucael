<!-- src/app/chat/chat.component.html -->
<div class="chat-container">
  <h2>Chat with {{ receiverId }}</h2>

  <div class="messages" #messagesContainer>
    <div *ngFor="let message of messages" class="message">
      <div
        [class.sender]="message.sender.id === currentUserId()"
        [class.receiver]="message.sender.id !== currentUserId()"
      >
        <strong>
          {{ message.sender.id === currentUserId() ? 'You' : message.sender.username }}:
        </strong>
        {{ message.content }}
        <small>{{ message.timestamp | date : 'shortTime' }}</small>
      </div>
    </div>
  </div>

  <div class="message-input">
    <input
      type="text"
      [(ngModel)]="newMessageContent"
      (keyup.enter)="sendMessage()"
      placeholder="Type your message..."
    />
    <p-button [label]="'Send'" (onClick)="sendMessage()" />
  </div>
</div>
