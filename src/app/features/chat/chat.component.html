<div class="chat-container">
  <div *ngIf="!interlocutorProfile() || isLoading()" class="loader-container">
    <app-loader />
  </div>
  @if(interlocutorProfile() && !isLoading()) {
  <app-chat-header
    [interlocutorProfile]="interlocutorProfile()"
    [isOnline]="isOnline()"
    [isTyping]="getTypingIndicatorVisible()"
  />

  <div class="messages" #messagesContainer (scroll)="onScroll()">
    <div *ngFor="let message of messages; trackBy: trackByMessageId" class="message">
      <div
        [class.sender]="message.sender.id === currentUserId()"
        [class.receiver]="message.sender.id !== currentUserId()"
      >
        <div class="message-content">
          {{ message.content }}
        </div>
        <div class="message-meta">
          <small>
            {{ formatMessageTime(message.timestamp) }}
          </small>
          <app-message-delete-button
            [message]="message"
            [currentUserId]="currentUserId()"
            (deleteMessage)="onDeleteMessage($event.event, $event.message)"
          />
        </div>
      </div>
    </div>
  </div>

  <p-dialog
    [(visible)]="showDeleteConfirmDialog"
    [header]="'chat.deleteConfirmation.header' | translate"
    [modal]="true"
    [closable]="true"
    [style]="{ width: '600px', maxWidth: '95vw' }"
    [draggable]="false"
    [resizable]="false"
    [closeOnEscape]="true"
    [appendTo]="'body'"
  >
    <p>{{ 'chat.deleteConfirmation.message' | translate }}</p>
    <ng-template pTemplate="footer">
      <div class="dialog-footer">
        <p-button
          [label]="'Cancel' | translate"
          icon="pi pi-times"
          severity="secondary"
          (onClick)="showDeleteConfirmDialog = false"
        />
        <p-button
          [label]="'chat.deleteConfirmation.accept' | translate"
          icon="pi pi-upload"
          (onClick)="confirmDeleteMessage()"
          severity="success"
        />
      </div>
    </ng-template>
  </p-dialog>

  <app-message-input
    [activeChatId]="activeChatId()"
    [receiverId]="receiverId"
    (messageSent)="handleMessageSent($event)"
  />

  <button
    *ngIf="showScrollToBottom()"
    type="button"
    pButton
    pRipple
    class="p-button p-button-secondary scroll-to-bottom-btn"
    (click)="scrollToBottomManual()"
    title="Scroll to bottom"
    aria-label="Scroll to newest messages"
  >
    <i class="pi pi-chevron-down" aria-hidden="true"></i>
  </button>
  }
</div>
