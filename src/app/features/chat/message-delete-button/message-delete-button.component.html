<button
  *ngIf="message.sender.id === currentUserId && message.id"
  type="button"
  class="delete-icon-btn"
  (click)="onDelete($event)"
  [title]="'chat.deleteMessage' | translate"
  [attr.aria-label]="'chat.deleteMessage' | translate"
  pButton
  pRipple
>
  <i class="pi pi-trash" aria-hidden="true"></i>
</button>
<p-progressSpinner
  *ngIf="!message.id"
  [styleClass]="'message-spinner'"
  [strokeWidth]="'3'"
  [animationDuration]="'1s'"
  [ariaLabel]="'Loading'"
/>
