<div class="app-container" [ngClass]="{ 'loading-overlay': isDataLoading() }">
  <app-toast position="top-center" />
  <app-loader *ngIf="isDataLoading()" />
  @if(isLoggedIn() || authService.getStoredToken()) {
  <router-outlet name="header"></router-outlet>
  }
  <main *ngIf="!isDataLoading()" class="main-content">
    <router-outlet />
  </main>
</div>
