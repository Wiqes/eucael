<header *ngIf="!isHidden()" class="header" [ngClass]="headerVisibilityClass()">
  <div class="logo-description-container">
    <div class="logo-description">
      <button (click)="onLogoClick()">
        <div class="logo">Eucael</div>
      </button>
    </div>
  </div>
  <div class="container">
    <ng-container *ngIf="displayName()">
      <app-notification />
      <app-user-avatar />
      <app-menu />
    </ng-container>
    <app-language-selector />
  </div>
</header>
