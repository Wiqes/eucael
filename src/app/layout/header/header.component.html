<header *ngIf="!isHidden()" class="header">
  <div class="logo-description-container">
    <div class="logo-description">
      <button (click)="onLogoClick()">
        <app-logo />
      </button>
    </div>
  </div>
  <div class="container">
    <ng-container *ngIf="displayName() || isDataLoading()">
      <app-user-avatar />
      <app-menu />
    </ng-container>
    <app-language-selector />
  </div>
</header>
