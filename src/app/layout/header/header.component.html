<p-progressbar
  *ngIf="isRefreshing()"
  mode="indeterminate"
  [style]="{ position: 'absolute', height: '4px', zIndex: 91000, top: '4px', width: '100%' }"
/>
<header *ngIf="!isHidden()" class="header" [ngClass]="headerVisibilityClass()">
  <div class="logo-description-container">
    <div class="logo-description">
      <button (click)="onLogoClick()">
        <div class="logo">Celestiel</div>
      </button>
    </div>
  </div>
  <div *ngIf="displayName()" class="container">
    <ng-container>
      <app-user-avatar />
      <app-menu />
    </ng-container>
    <app-language-selector />
  </div>
</header>
